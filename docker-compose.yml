services:
  wonka:
    build: .
    container_name: wonka
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/app/pb_data
    environment:
      - TZ=Asia/Taipei
      - WONKA_ADMIN_KEY=${WONKA_ADMIN_KEY}
      - WONKA_AI_API_KEY=${WONKA_AI_API_KEY}
      - WONKA_AI_BASE_URL=${WONKA_AI_BASE_URL}
      - WONKA_AI_MODEL=${WONKA_AI_MODEL}
